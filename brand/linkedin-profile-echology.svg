<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#c8a84e" stroke-width="0.4" opacity="0.04"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#c8a84e" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#c8a84e" stop-opacity="0"/>
    </radialGradient>
    <filter id="fire" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="#0E1114"/>
  <rect width="400" height="400" fill="url(#grid)"/>
  <rect width="400" height="400" fill="url(#glow)"/>

  <!-- Echology prism, centered -->
  <g transform="translate(200, 180) scale(2.2)">
    <polygon points="0,-62 52,-34 52,34 0,62 -52,34 -52,-34" stroke="#c8a84e" stroke-width="2" fill="none"/>
    <!-- Crown facet -->
    <polygon points="0,-62 52,-34 28,-10 -18,-22" fill="#d4b870" opacity="0.25"/>
    <!-- Right pavilion -->
    <polygon points="52,-34 52,34 28,-10" fill="#c8a84e" opacity="0.15"/>
    <!-- Left pavilion -->
    <polygon points="0,-62 -52,-34 -18,-22" fill="#c8a84e" opacity="0.18"/>
    <!-- Bottom pavilion -->
    <polygon points="-52,34 0,62 52,34 28,10 -18,22" fill="#c8a84e" opacity="0.08"/>
    <!-- Inner hex ring -->
    <polygon points="0,-24 26,-10 26,22 0,36 -26,22 -26,-10" stroke="#c8a84e" stroke-width="1.5" opacity="0.25" fill="none"/>
    <!-- Three-axis lines -->
    <line x1="0" y1="-62" x2="0" y2="62" stroke="#c8a84e" stroke-width="1" opacity="0.1"/>
    <line x1="-52" y1="-34" x2="52" y2="34" stroke="#c8a84e" stroke-width="1" opacity="0.08"/>
    <line x1="52" y1="-34" x2="-52" y2="34" stroke="#c8a84e" stroke-width="1" opacity="0.08"/>
    <!-- Center point -->
    <circle cx="0" cy="0" r="6" fill="#c8a84e" opacity="0.8" filter="url(#fire)"/>
    <!-- Fire vertices -->
    <circle cx="0" cy="-62" r="3" fill="#e8d5a0" opacity="0.7" filter="url(#fire)"/>
    <circle cx="52" cy="-34" r="2.5" fill="#d4b870" opacity="0.6"/>
    <circle cx="52" cy="34" r="2" fill="#c8a84e" opacity="0.4"/>
    <circle cx="0" cy="62" r="2" fill="#c8a84e" opacity="0.3"/>
    <circle cx="-52" cy="34" r="2" fill="#c8a84e" opacity="0.35"/>
    <circle cx="-52" cy="-34" r="2.5" fill="#d4b870" opacity="0.55"/>
  </g>

  <!-- Wordmark -->
  <text x="200" y="348" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="18" font-weight="300" letter-spacing="6" fill="#c8a84e" opacity="0.75">ECHOLOGY</text>
</svg>