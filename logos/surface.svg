<svg width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Surface: AI Citation Intelligence -- purple (#8b6cc7) -->
  <polygon points="80,12 132,40 132,108 80,136 28,108 28,40" stroke="#8b6cc7" stroke-width="2" fill="none"/>
  <!-- Crown facet -->
  <polygon points="80,12 132,40 108,64 62,52" fill="#c4aee8" opacity="0.25"/>
