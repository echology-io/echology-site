<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Kyle Vines</title>
    <meta name="description" content="Get in touch with Kyle Vines. Signal Provenance, Sympatheia, collaboration, or just say hello.">
    <link rel="stylesheet" href="style.css">
    <script defer data-domain="kylevines.com" src="https://plausible.io/js/script.tagged-events.js"></script>
</head>
<body>

    <canvas id="field"></canvas>

    <div id="content">

        <nav>
            <div class="container">
                <a href="/" class="logo">kylevines<span>.</span></a>
                <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')">&#9776;</button>
                <div class="nav-links">
                    <a href="/">Home</a>
                    <a href="/about">About</a>
                    <a href="/blog">Blog</a>

                    <a href="/contact" class="active">Contact</a>
                    <button class="mode-toggle" onclick="toggleMode()" title="Toggle light/dark mode" aria-label="Toggle light/dark mode">&#9789;</button>
                </div>
            </div>
        </nav>

        <section class="hero">
            <div class="container container--narrow">
                <h1>Get in<br><span>touch.</span></h1>
                <p class="sub">Signal Provenance, Sympatheia, collaboration, or just saying hello.</p>
            </div>
        </section>

        <section>
            <div class="container container--narrow">
                <form id="contact-form" onsubmit="return handleSubmit(event)">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="subject">Subject</label>
                        <select id="subject" name="subject">
                            <option value="Signal Provenance">Signal Provenance</option>
                            <option value="Sympatheia">Sympatheia</option>
                            <option value="Collaboration">Collaboration</option>
                            <option value="General">General</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="6" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Send Message</button>
                </form>
            </div>
        </section>

        <section>
            <div class="container container--narrow" style="text-align:center;">
                <p class="section-label">Direct</p>
                <p class="section-desc" style="color: var(--muted); font-size: 14px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;">
                    <a href="mailto:kyle@echology.io">kyle@echology.io</a><br>
                    <a href="https://github.com/echology-io">github.com/echology-io</a><br>
                    Charleston, South Carolina
                </p>
            </div>
        </section>

        <footer>
            <div class="container">
                <div class="copy">&copy; 2026 Kyle Vines</div>
                <div class="footer-links">
                    <a href="/provenance">Provenance</a>
                    <a href="/sympatheia">Sympatheia</a>
                    <a href="/blog">Blog</a>
                    <a href="/about">About</a>
                    <a href="/contact">Contact</a>
                    <a href="https://github.com/echology-io">GitHub</a>
                </div>
            </div>
        </footer>

    </div>

    <script src="field.js"></script>
    <script>
    function handleSubmit(e) {
        e.preventDefault();
        var f = document.getElementById('contact-form');
        var name = f.name.value;
        var email = f.email.value;
        var subject = f.subject.value;
        var message = f.message.value;
        var btn = f.querySelector('button[type="submit"]');
        btn.disabled = true;
        btn.textContent = 'Sending...';
        if (window.plausible) {
            plausible('Contact-Submit', {props: {product: subject}});
        }
        fetch('https://ops.echology.io/api/leads/inbound', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                name: name,
                email: email,
                interest: subject,
                message: message,
                source: 'kylevines.com'
            })
        }).then(function(r) { return r.json(); }).then(function(data) {
            btn.textContent = 'Sent';
            f.reset();
            var msg = document.createElement('p');
            msg.style.cssText = 'color: var(--accent); text-align: center; margin-top: 16px;';
            msg.textContent = 'Message received. I will get back to you.';
            f.parentNode.appendChild(msg);
        }).catch(function() {
            btn.disabled = false;
            btn.textContent = 'Send Message';
            window.location.href = 'mailto:kyle@echology.io'
                + '?subject=' + encodeURIComponent('[kylevines.com] ' + subject + ' - ' + name)
                + '&body=' + encodeURIComponent('Name: ' + name + '\nEmail: ' + email + '\n\n' + message);
        });
        return false;
    }
    function toggleMode() {
        var isLight = document.body.classList.toggle('light');
        var btn = document.querySelector('.mode-toggle');
        btn.innerHTML = isLight ? '&#9788;' : '&#9789;';
        localStorage.setItem('mode', isLight ? 'light' : 'dark');
    }
    (function() {
        if (localStorage.getItem('mode') === 'light') {
            document.body.classList.add('light');
            var btn = document.querySelector('.mode-toggle');
            if (btn) btn.innerHTML = '&#9788;';
        }
    })();
    </script>
</body>
</html>
